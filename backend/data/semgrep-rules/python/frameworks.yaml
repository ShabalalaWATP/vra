rules:
  # ── Django-specific ────────────────────────────────────────────
  - id: python.django.raw-sql
    patterns:
      - pattern-either:
          - pattern: $CONN.cursor().execute($SQL % ...)
          - pattern: $CONN.cursor().execute($SQL.format(...))
          - pattern: $CONN.cursor().execute(f"...{$VAR}...")
          - pattern: RawSQL($SQL, ...)
    message: "Django raw SQL with string formatting. Use parameterised queries."
    severity: ERROR
    languages: [python]
    metadata: { cwe: CWE-89, category: security, confidence: HIGH }

  - id: python.django.mark-safe
    pattern: mark_safe($VAR)
    message: "mark_safe() disables Django auto-escaping. Ensure content is sanitised."
    severity: WARNING
    languages: [python]
    metadata: { cwe: CWE-79, category: security, confidence: MEDIUM }

  - id: python.django.session-cookie-insecure
    patterns:
      - pattern-either:
          - pattern: SESSION_COOKIE_SECURE = False
          - pattern: SESSION_COOKIE_HTTPONLY = False
          - pattern: CSRF_COOKIE_SECURE = False
    message: "Insecure session/CSRF cookie settings. Set to True in production."
    severity: WARNING
    languages: [python]
    metadata: { cwe: CWE-614, category: security, confidence: HIGH }

  - id: python.django.allowed-hosts-wildcard
    pattern: ALLOWED_HOSTS = ["*"]
    message: "ALLOWED_HOSTS allows all hosts. Restrict to specific domains."
    severity: WARNING
    languages: [python]
    metadata: { cwe: CWE-16, category: security, confidence: HIGH }

  - id: python.django.secret-key-hardcoded
    pattern: SECRET_KEY = "..."
    message: "Django SECRET_KEY is hardcoded. Use environment variable."
    severity: ERROR
    languages: [python]
    metadata: { cwe: CWE-798, category: security, confidence: HIGH }

  - id: python.django.no-password-validators
    pattern: AUTH_PASSWORD_VALIDATORS = []
    message: "Empty password validators. Add Django's built-in validators."
    severity: WARNING
    languages: [python]
    metadata: { cwe: CWE-521, category: security, confidence: HIGH }

  # ── Flask-specific ─────────────────────────────────────────────
  - id: python.flask.render-template-string
    patterns:
      - pattern-either:
          - pattern: render_template_string($TEMPLATE)
          - pattern: render_template_string(request.$ATTR[...])
    message: "render_template_string with user input enables SSTI."
    severity: ERROR
    languages: [python]
    metadata: { cwe: CWE-94, category: security, confidence: HIGH }

  - id: python.flask.session-secret-weak
    patterns:
      - pattern-either:
          - pattern: app.secret_key = "..."
          - pattern: app.config["SECRET_KEY"] = "..."
    message: "Hardcoded Flask secret key. Use environment variable with strong random value."
    severity: ERROR
    languages: [python]
    metadata: { cwe: CWE-798, category: security, confidence: HIGH }

  - id: python.flask.send-file-user-input
    patterns:
      - pattern-either:
          - pattern: send_file(request.args.get(...))
          - pattern: send_file(request.form.get(...))
          - pattern: send_from_directory($DIR, request.args.get(...))
    message: "File served from user input. Validate path to prevent directory traversal."
    severity: ERROR
    languages: [python]
    metadata: { cwe: CWE-22, category: security, confidence: HIGH }

  # ── FastAPI-specific ───────────────────────────────────────────
  - id: python.fastapi.cors-allow-all
    patterns:
      - pattern-either:
          - pattern: allow_origins=["*"]
          - pattern: allow_origins=["*"], allow_credentials=True
    message: "CORS allows all origins. Restrict to specific trusted domains."
    severity: WARNING
    languages: [python]
    metadata: { cwe: CWE-942, category: security, confidence: HIGH }

  # ── SQLAlchemy-specific ────────────────────────────────────────
  - id: python.sqlalchemy.text-injection
    patterns:
      - pattern-either:
          - pattern: text($SQL + $VAR)
          - pattern: text(f"...{$VAR}...")
          - pattern: text($SQL.format(...))
    message: "SQLAlchemy text() with string formatting. Use text() with :bind parameters."
    severity: ERROR
    languages: [python]
    metadata: { cwe: CWE-89, category: security, confidence: HIGH }

  # ── General Python security ────────────────────────────────────
  - id: python.tempfile.insecure
    patterns:
      - pattern-either:
          - pattern: tempfile.mktemp(...)
    message: "tempfile.mktemp() is insecure (race condition). Use tempfile.mkstemp() or NamedTemporaryFile."
    severity: WARNING
    languages: [python]
    metadata: { cwe: CWE-377, category: security, confidence: HIGH }

  - id: python.assert-security
    pattern: assert $CONDITION, ...
    message: "assert statements are stripped in optimised mode (-O). Don't use for security checks."
    severity: WARNING
    languages: [python]
    metadata: { cwe: CWE-617, category: security, confidence: LOW }

  - id: python.logging.sensitive-data
    patterns:
      - pattern-either:
          - pattern: $LOG.info(..., password=..., ...)
          - pattern: $LOG.info(f"...password...{$VAR}...")
          - pattern: $LOG.debug(f"...token...{$VAR}...")
          - pattern: $LOG.info(f"...secret...{$VAR}...")
    message: "Sensitive data logged. Remove or mask credentials from log output."
    severity: WARNING
    languages: [python]
    metadata: { cwe: CWE-532, category: security, confidence: MEDIUM }

  - id: python.file-permissions.world-writable
    patterns:
      - pattern-either:
          - pattern: os.chmod($PATH, 0o777)
          - pattern: os.chmod($PATH, 0o666)
    message: "World-writable file permissions. Use restrictive permissions (0o600 or 0o644)."
    severity: WARNING
    languages: [python]
    metadata: { cwe: CWE-732, category: security, confidence: HIGH }

  - id: python.xml.defused
    patterns:
      - pattern-either:
          - pattern: xml.etree.ElementTree.parse($INPUT)
          - pattern: xml.sax.parse($INPUT, ...)
          - pattern: xml.dom.minidom.parse($INPUT)
    message: "Standard library XML parsing is vulnerable to XXE. Use defusedxml."
    severity: WARNING
    languages: [python]
    metadata: { cwe: CWE-611, category: security, confidence: MEDIUM }

  - id: python.regex-dos
    pattern: re.compile(request.$ATTR[...])
    message: "Regex from user input enables ReDoS. Use a safe regex library or timeout."
    severity: WARNING
    languages: [python]
    metadata: { cwe: CWE-1333, category: security, confidence: MEDIUM }

  - id: python.mass-assignment
    patterns:
      - pattern-either:
          - pattern: $MODEL(**request.json)
          - pattern: $MODEL(**request.form)
          - pattern: $SERIALIZER(data=request.data)
    message: "Mass assignment from request data. Whitelist allowed fields."
    severity: WARNING
    languages: [python]
    metadata: { cwe: CWE-915, category: security, confidence: MEDIUM }
