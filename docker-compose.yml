services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      VRAGENT_DATABASE_URL: sqlite+aiosqlite:///app/data/vragent.db
      VRAGENT_CORS_ORIGINS: "http://localhost:3000,http://frontend:3000"
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
      - scan_data:/app/exports
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  scan_data:
